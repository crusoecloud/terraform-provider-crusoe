name: semver tag

on:
  push:
    branches:
      - release

permissions:
  contents: write

jobs:
  semver-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config user.name "crusoe-cloud"
          git config user.email "support@crusoecloud.com"

      - name: Load versions from text file
        run: |
          source versions.env
          echo "MAJOR_VERSION=${MAJOR_VERSION}" >> $GITHUB_ENV
          echo "MINOR_VERSION=${MINOR_VERSION}" >> $GITHUB_ENV

      - name: Calculate and set new version
        run: |
          chmod +x ./scripts/tag_semver.sh
          ./scripts/tag_semver.sh $MAJOR_VERSION $MINOR_VERSION ""
        shell: bash

      - name: Read version and push tag
        run: |
          source variables.env
          echo "Calculated version: $RELEASE_VERSION"
          source variables.env
          git tag $RELEASE_VERSION
          git push origin $RELEASE_VERSION

  goreleaser:
    needs: semver-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e5e7e5ab8b370d6c329ec480221332ada57f0ab # v3.5.2
        with:
          # Allow goreleaser to access older tag information.
          fetch-depth: 0
      - uses: actions/setup-go@4d34df0c2316fe8122ab82dc22947d607c0c91f9 # v4.0.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@72b6676b71ab476b77e676928516f6982eef7a41 # v5.3.0
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@286f3b13b1b49da4ac219696163fb8c1c93e1200 # v6.0.0
        with:
          args: release --clean
          version: 2.1.x
        env:
          # GitHub sets the GITHUB_TOKEN secret automatically.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}

      - name: Announce release to Slack
        continue-on-error: true
        env:
          SLACK_CCX_CI_RELEASES_WEBHOOK_URL: ${{ secrets.SLACK_CCX_CI_RELEASES_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_CCX_CI_RELEASES_WEBHOOK_URL" ]; then
            echo "SLACK_CCX_CI_RELEASES_WEBHOOK_URL not configured; skipping Slack announcement." >&2
            exit 0
          fi
          # --exact-match: fail loudly if no tag points at HEAD rather than announcing a stale tag.
          TAG=$(git describe --tags --exact-match HEAD)
          # This pipeline only emits stable vX.Y.Z tags; skip manually created
          # pre-release tags (e.g. v1.2.3-rc1) just in case.
          if echo "$TAG" | grep -q '-'; then
            echo "Pre-release tag $TAG detected; skipping Slack announcement."
            exit 0
          fi
          COMMIT_SHORT=$(git rev-parse --short=8 HEAD)
          RELEASE_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${TAG}"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          PAYLOAD=$(jq -n \
            --arg tag "$TAG" \
            --arg commit "$COMMIT_SHORT" \
            --arg actor "$GITHUB_ACTOR" \
            --arg release_url "$RELEASE_URL" \
            --arg run_url "$RUN_URL" \
            '{
              text: "*Terraform Provider Crusoe \($tag) Released Successfully*",
              blocks: [
                {
                  type: "header",
                  text: {
                    type: "plain_text",
                    text: "Terraform Provider Crusoe \($tag) Released"
                  }
                },
                {
                  type: "section",
                  fields: [
                    { type: "mrkdwn", text: "*Version:*\n\($tag)" },
                    { type: "mrkdwn", text: "*Commit:*\n\($commit)" },
                    { type: "mrkdwn", text: "*Released by:*\n\($actor)" },
                    { type: "mrkdwn", text: "*Source:*\nGitHub Actions" }
                  ]
                },
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: "*Install / Download:*\n• <\($release_url)|GitHub Release>\n• Terraform Registry: `crusoecloud/crusoe`"
                  }
                },
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: "<\($run_url)|View Workflow Run>"
                  }
                }
              ]
            }')
          curl -sS --fail-with-body --max-time 10 -X POST "$SLACK_CCX_CI_RELEASES_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD"
